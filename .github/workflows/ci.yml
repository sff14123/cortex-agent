name: Cortex Agents CI

on:
  push:
    branches: [ "main", "dev", "dev-win", "dev-*", "dev/**" ]
    paths:
      - 'scripts/**'
      - 'settings.yaml'
      - 'pyproject.toml'
      - '.github/workflows/**'
      - '!**/*.md'
      - '!docs/**'
  pull_request:
    branches: [ "main", "dev", "dev-win", "dev-*", "dev/**" ]
    paths:
      - 'scripts/**'
      - 'settings.yaml'
      - 'pyproject.toml'
      - '.github/workflows/**'
      - '!**/*.md'
      - '!docs/**'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    defaults:
      run:
        shell: bash

    env:
      PYTHONPATH: scripts
      PYTHONUTF8: "1"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Sync Dependencies
        run: uv sync

      - name: Verify Environment Setup
        run: |
          uv run python -c "import mcp; import tree_sitter; print('Environment is strictly valid!')"

      - name: Run Syntax Check for All Runtime Files
        run: |
          uv run python -m compileall scripts/cortex
          uv run python - <<'PY'
          from pathlib import Path
          import py_compile

          targets = sorted(Path("scripts").rglob("*.py"))
          if not targets:
              raise SystemExit("No Python files found under scripts/")

          for path in targets:
              py_compile.compile(str(path), doraise=True)
          print(f"py_compile verified {len(targets)} Python files")
          PY

      - name: Run Comprehensive Import Smoke Check
        run: |
          uv run python scripts/cortex/dev/verify_imports.py

      - name: Run Comprehensive Regression Tests
        run: |
          for test_file in scripts/cortex/tests/test_*.py; do
            case "$test_file" in
              *test_mcp_smoke.py)
                echo "Skipping $test_file (covered by dedicated MCP smoke step)"
                continue
                ;;
            esac
            echo "Running $test_file"
            uv run python "$test_file"
          done

      - name: Test Core Indexing & Embedding Engine
        env:
          CORTEX_HOME: ${{ github.workspace }}/test_workspace/.cortex
          CORTEX_WORKSPACE: ${{ github.workspace }}/test_workspace
        run: |
          mkdir -p test_workspace/.cortex/skills/dummy-skill
          mkdir -p test_workspace/.cortex/data test_workspace/.cortex/history
          mkdir -p test_workspace/src test_workspace/outside
          cat > test_workspace/.cortex/settings.yaml <<'YAML'
          indexing_rules:
            index_roots:
              - src
            include_paths:
              - "**"
            exclude_paths:
              - "outside/**"
          YAML
          echo "def inner_func(): return 1" > test_workspace/src/dummy.py
          echo "def outer_func(): return inner_func()" >> test_workspace/src/dummy.py
          echo "namespace Test { public class Sample { void Work() {} } }" > test_workspace/src/dummy.cs
          echo "export function sampleTs() { return 0; }" > test_workspace/src/dummy.ts
          echo "def should_not_be_indexed(): return 0" > test_workspace/outside/skip.py

          printf '%s\n' '---' 'name: dummy-skill' 'description: A dummy skill for CI knowledge embedding test' 'tags: [test, ci, cortex]' '---' '# Dummy Skill' '' 'This file proves that skill/knowledge markdown parsing and embedding works correctly.' > test_workspace/.cortex/skills/dummy-skill/SKILL.md

          uv run python scripts/cortex/indexer.py "$CORTEX_WORKSPACE" --force

          echo "Verifying generated artifacts and logic..."
          if [ ! -f ./test_workspace/.cortex/data/memories.db ]; then
            echo "memories.db missing!"
            exit 1
          fi

          MEM_COUNT=$(python -c "import sqlite3; db=sqlite3.connect('./test_workspace/.cortex/data/memories.db'); print(db.execute(\"SELECT COUNT(*) FROM memories WHERE category='skill';\").fetchone()[0])")
          if [ "$MEM_COUNT" -le 0 ]; then
            echo "No skill memories found. sync_skills or knowledge embedding may be broken."
            exit 1
          fi
          echo "Knowledge embedding verified: $MEM_COUNT skill(s) in memories DB"

          EDGE_COUNT=$(python -c "import sqlite3; db=sqlite3.connect('./test_workspace/.cortex/data/memories.db'); print(db.execute(\"SELECT count(*) FROM edges WHERE type='CALLS';\").fetchone()[0])")
          if [ "$EDGE_COUNT" -eq 0 ]; then
            echo "AST Parser failed. No CALL edges extracted."
            exit 1
          fi
          echo "AST Parser extracted $EDGE_COUNT CALL edges."

          SRC_COUNT=$(python -c "import sqlite3; db=sqlite3.connect('./test_workspace/.cortex/data/memories.db'); print(db.execute(\"SELECT COUNT(*) FROM file_cache WHERE REPLACE(file_path, char(92), '/') LIKE 'src/%';\").fetchone()[0])")
          OUTSIDE_COUNT=$(python -c "import sqlite3; db=sqlite3.connect('./test_workspace/.cortex/data/memories.db'); print(db.execute(\"SELECT COUNT(*) FROM file_cache WHERE REPLACE(file_path, char(92), '/') LIKE 'outside/%';\").fetchone()[0])")
          if [ "$SRC_COUNT" -eq 0 ] || [ "$OUTSIDE_COUNT" -ne 0 ]; then
            echo "index_roots filtering failed. src=$SRC_COUNT outside=$OUTSIDE_COUNT"
            exit 1
          fi
          echo "index_roots filtering verified: src=$SRC_COUNT outside=$OUTSIDE_COUNT"

      - name: Test MCP Server Protocol (JSON-RPC)
        env:
          CORTEX_HOME: ${{ github.workspace }}/test_workspace/.cortex
          CORTEX_WORKSPACE: ${{ github.workspace }}/test_workspace
        run: |
          uv run python scripts/cortex/tests/test_mcp_smoke.py
