name: Cortex Agents CI

on:
  push:
    branches: [ "main", "dev", "dev-win", "dev-*" ]
    paths:
      - 'scripts/**'
      - 'settings.yaml'
      - 'pyproject.toml'
      - '.github/workflows/**'
      - '!**/*.md'
      - '!docs/**'
  pull_request:
    branches: [ "main", "dev", "dev-win", "dev-*" ]
    paths:
      - 'scripts/**'
      - 'settings.yaml'
      - 'pyproject.toml'
      - '.github/workflows/**'
      - '!**/*.md'
      - '!docs/**'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    
    defaults:
      run:
        shell: bash
    
    env:
      PYTHONPATH: scripts
      PYTHONUTF8: "1"
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Sync Dependencies
        run: uv sync

      - name: Verify Environment Setup
        run: |
          # 기본 의존성 충돌 여부 및 환경 생성 성공 여부 검증
          uv run python -c "import mcp; import tree_sitter; print('Environment is strictly valid!')"

      - name: Run Syntax and Import Check
        run: |
          # 파이썬 파일들에 문법적 오류나 Import 에러가 없는지 전체 검증
          uv run python - <<'PY'
          from pathlib import Path
          import py_compile

          for pattern in ("scripts/*.py", "scripts/cortex/*.py", "scripts/cortex/tests/*.py"):
              for path in Path().glob(pattern):
                  py_compile.compile(str(path), doraise=True)
          PY

      - name: Run Focused Regression Tests
        run: |
          # 운영 DB를 건드리지 않는 격리형 회귀 테스트
          uv run python scripts/cortex/tests/test_file_edit_events.py
          uv run python scripts/cortex/tests/test_path_index_roots.py

      - name: Test Core Indexing & Embedding Engine
        run: |
          # 1) 테스트용 별도 워크스페이스 및 명시적 인덱싱 루트 생성
          mkdir -p test_workspace/.agents/skills/dummy-skill
          mkdir -p test_workspace/src test_workspace/outside
          cat > test_workspace/.agents/settings.yaml <<'YAML'
          indexing_rules:
            index_roots:
              - src
            include_paths:
              - "**"
            exclude_paths:
              - "outside/**"
          YAML
          echo "def inner_func(): return 1" > test_workspace/src/dummy.py
          echo "def outer_func(): return inner_func()" >> test_workspace/src/dummy.py
          echo "namespace Test { public class Sample { void Work() {} } }" > test_workspace/src/dummy.cs
          echo "export function sampleTs() { return 0; }" > test_workspace/src/dummy.ts
          echo "def should_not_be_indexed(): return 0" > test_workspace/outside/skip.py

          # 지식 문서 임베딩 시나리오: sync_skills가 스캔하는 실제 경로에 더미 스킬 배치
          printf '%s\n' '---' 'name: dummy-skill' 'description: A dummy skill for CI knowledge embedding test' 'tags: [test, ci, cortex]' '---' '# Dummy Skill' '' 'This file proves that skill/knowledge markdown parsing and embedding works correctly.' > test_workspace/.agents/skills/dummy-skill/SKILL.md

          # 2) 인덱싱 실행 (test_workspace 경로를 워크스페이스로 지정)
          uv run python scripts/cortex/indexer.py ./test_workspace --force

          # 3) 생성된 SQLite DB 파일 및 AST 파서/루트 제한 무결성 검증
          echo "Verifying generated artifacts and logic..."
          if [ ! -f ./test_workspace/.agents/data/memories.db ]; then
            echo "memories.db missing!"
            exit 1
          fi

          # total_memories > 0 검증: sync_skills가 dummy-skill을 memories에 저장했는지 확인
          MEM_COUNT=$(python -c "import sqlite3; db=sqlite3.connect('./test_workspace/.agents/data/memories.db'); print(db.execute(\"SELECT COUNT(*) FROM memories WHERE category='skill';\").fetchone()[0])")
          if [ "$MEM_COUNT" -le 0 ]; then
            echo "No skill memories found. sync_skills or knowledge embedding may be broken."
            exit 1
          fi
          echo "Knowledge embedding verified: $MEM_COUNT skill(s) in memories DB"

          # sqlite3로 직접 DB를 까서 Tree-sitter 파서가 CALL 관계를 1개 이상 뽑아냈는지 검사
          EDGE_COUNT=$(python -c "import sqlite3; db=sqlite3.connect('./test_workspace/.agents/data/memories.db'); print(db.execute(\"SELECT count(*) FROM edges WHERE type='CALLS';\").fetchone()[0])")
          if [ "$EDGE_COUNT" -eq 0 ]; then
            echo "AST Parser failed. No CALL edges extracted."
            exit 1
          fi
          echo "AST Parser extracted $EDGE_COUNT CALL edges."

          # index_roots가 지정한 src만 소스 인덱싱 대상이 되는지 확인
          SRC_COUNT=$(python -c "import sqlite3; db=sqlite3.connect('./test_workspace/.agents/data/memories.db'); print(db.execute(\"SELECT COUNT(*) FROM file_cache WHERE REPLACE(file_path, char(92), '/') LIKE 'src/%';\").fetchone()[0])")
          OUTSIDE_COUNT=$(python -c "import sqlite3; db=sqlite3.connect('./test_workspace/.agents/data/memories.db'); print(db.execute(\"SELECT COUNT(*) FROM file_cache WHERE REPLACE(file_path, char(92), '/') LIKE 'outside/%';\").fetchone()[0])")
          if [ "$SRC_COUNT" -eq 0 ] || [ "$OUTSIDE_COUNT" -ne 0 ]; then
            echo "index_roots filtering failed. src=$SRC_COUNT outside=$OUTSIDE_COUNT"
            exit 1
          fi
          echo "index_roots filtering verified: src=$SRC_COUNT outside=$OUTSIDE_COUNT"

      - name: Test MCP Server Protocol (JSON-RPC)
        env:
          CORTEX_WORKSPACE: ${{ github.workspace }}/test_workspace
        run: |
          # 1) tools/list API 호출 (현재 도구 레지스트리 검증)
          echo '{"jsonrpc": "2.0", "method": "tools/list", "id": 1}' > mcp_list.json
          RESPONSE_LIST=$(uv run python scripts/cortex_mcp.py < mcp_list.json)
          
          CRITICAL_TOOLS=("pc_reindex" "pc_index_status" "pc_capsule" "pc_skeleton" "pc_impact_graph" "pc_logic_flow" "pc_git_log" "pc_run_pipeline" "pc_auto_context" "pc_read_with_hash" "pc_strict_replace" "pc_create_contract" "pc_todo_manager" "pc_session_sync" "pc_memory_write" "pc_memory_consolidate" "pc_memory_read" "pc_save_observation" "pc_memory_search_knowledge" "pc_run_background_task" "pc_index_roots_list" "pc_index_roots_add" "pc_index_roots_remove")
          for tool in "${CRITICAL_TOOLS[@]}"; do
            if [[ "$RESPONSE_LIST" != *"$tool"* ]]; then
              echo "MCP Tool missing from registry: $tool"
              exit 1
            fi
          done
          echo "All critical MCP tools are registered."

          # 2) tools/call API (pc_index_status) 호출 -> 실제 DB 연동 작동 여부 검증
          echo '{"jsonrpc": "2.0", "method": "tools/call", "id": 2, "params": {"name": "pc_index_status", "arguments": {}}}' > mcp_call.json
          RESPONSE_CALL=$(uv run python scripts/cortex_mcp.py < mcp_call.json)
          
          if [[ "$RESPONSE_CALL" != *"total_nodes"* ]] || [[ "$RESPONSE_CALL" != *"total_memories"* ]]; then
            echo "MCP Server failed to execute pc_index_status."
            echo "Response: $RESPONSE_CALL"
            exit 1
          fi
          echo "MCP pc_index_status verified."

          # 3) index_roots 관리 도구의 조회/dry-run 동작 검증
          echo '{"jsonrpc": "2.0", "method": "tools/call", "id": 3, "params": {"name": "pc_index_roots_list", "arguments": {}}}' > mcp_roots_list.json
          RESPONSE_ROOTS_LIST=$(uv run python scripts/cortex_mcp.py < mcp_roots_list.json)
          ROOTS_COUNT=$(echo "$RESPONSE_ROOTS_LIST" | jq -r '.result.content[0].text' | jq '[.index_roots[]?] | length')
          if [ "$ROOTS_COUNT" -eq 0 ]; then
            echo "pc_index_roots_list returned no roots."
            echo "Response: $RESPONSE_ROOTS_LIST"
            exit 1
          fi

          echo '{"jsonrpc": "2.0", "method": "tools/call", "id": 4, "params": {"name": "pc_index_roots_add", "arguments": {"path": ".agents/skills", "dry_run": true}}}' > mcp_roots_add.json
          RESPONSE_ROOTS_ADD=$(uv run python scripts/cortex_mcp.py < mcp_roots_add.json)
          ADD_EXECUTED=$(echo "$RESPONSE_ROOTS_ADD" | jq -r '.result.content[0].text' | jq -r '.executed')
          ADD_SCAN_COUNT=$(echo "$RESPONSE_ROOTS_ADD" | jq -r '.result.content[0].text' | jq -r '.scan_count')
          if [ "$ADD_EXECUTED" != "false" ] || [ "$ADD_SCAN_COUNT" -lt 1 ]; then
            echo "pc_index_roots_add dry-run failed."
            echo "Response: $RESPONSE_ROOTS_ADD"
            exit 1
          fi
          echo "MCP index_roots dry-run verified."
          
          # 4) tools/call API (pc_run_pipeline) 호출 -> 실제 RRF 파이프라인 구조 검증
          echo '{"jsonrpc": "2.0", "method": "tools/call", "id": 5, "params": {"name": "pc_run_pipeline", "arguments": {"query": "func"}}}' > mcp_pipeline.json
          RESPONSE_PIPELINE=$(uv run python scripts/cortex_mcp.py < mcp_pipeline.json)

          ERROR_MSG=$(echo "$RESPONSE_PIPELINE" | jq -r '.error // empty')
          if [ -n "$ERROR_MSG" ]; then
            echo "Pipeline failed with error: $ERROR_MSG"
            exit 1
          fi

          RESULT_COUNT=$(echo "$RESPONSE_PIPELINE" \
            | jq -r '.result.content[0].text' \
            | jq '[.unified_context[]?] | length')

          if [ "$RESULT_COUNT" -le 0 ]; then
            echo "MCP Pipeline returned empty unified_context."
            echo "Response: $RESPONSE_PIPELINE"
            exit 1
          fi
          echo "MCP Pipeline Search returned $RESULT_COUNT results via RRF."



