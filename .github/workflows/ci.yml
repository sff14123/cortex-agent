name: Cortex Agents CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: scripts
    
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Sync Dependencies
        run: uv sync

      - name: Verify Environment Setup
        run: |
          # 기본 의존성 충돌 여부 및 환경 생성 성공 여부 검증
          uv run python -c "import mcp; import tree_sitter; print('Environment is strictly valid!')"

      - name: Run Syntax and Import Check
        run: |
          # 파이썬 파일들에 문법적 오류나 Import 에러가 없는지 전체 검증
          uv run python -m py_compile scripts/*.py
          uv run python -m py_compile scripts/cortex/*.py

      - name: Test Core Indexing & Embedding Engine
        run: |
          # 1) 테스트용 더미 프로젝트 구조 생성
          mkdir test_workspace
          echo "def sample_python_func():" > test_workspace/test.py
          echo "    pass" >> test_workspace/test.py
          echo "namespace Test { public class Sample { void Work() {} } }" > test_workspace/test.cs
          echo "export function sampleTs() { return 0; }" > test_workspace/test.ts
          
          # 2) 인덱싱 및 임베딩 구동 (HuggingFace 모델 다운로드 포함)
          uv run python scripts/cortex/indexer.py ./test_workspace --force
          
          # 3) 생성된 SQLite DB 파일 검증
          echo "Verifying generated artifacts..."
          if [ ! -f ./test_workspace/.agents/data/memories.db ]; then
            echo "❌ memories.db missing!"
            exit 1
          fi
          echo "✅ memories.db generated successfully!"

      - name: Test MCP Server Protocol (JSON-RPC)
        run: |
          # 1) tools/list API 호출 테스트 (가상 클라이언트 요청 시뮬레이션)
          echo '{"jsonrpc": "2.0", "method": "tools/list", "id": 1}' > mcp_request.json
          RESPONSE=$(uv run python scripts/cortex_mcp.py < mcp_request.json)
          
          # 2) 응답 결과에 모든 도구(총 21개)들이 온전히 포함되었는지 검증
          CRITICAL_TOOLS=("pc_reindex" "pc_index_status" "pc_capsule" "pc_skeleton" "pc_auto_explore" "pc_impact_graph" "pc_logic_flow" "pc_git_log" "pc_run_pipeline" "pc_auto_context" "pc_read_with_hash" "pc_strict_replace" "pc_create_contract" "pc_todo_manager" "pc_session_sync" "pc_memory_write" "pc_memory_consolidate" "pc_memory_read" "pc_save_observation" "pc_memory_search_knowledge" "pc_run_background_task")

          for tool in "${CRITICAL_TOOLS[@]}"; do
            if [[ "$RESPONSE" == *"$tool"* ]]; then
              echo "✅ MCP Tool registration verified: $tool"
            else
              echo "❌ MCP Tool missing from registry: $tool"
              echo "Full Response was: $RESPONSE"
              exit 1
            fi
          done
          echo "🎉 All critical MCP tools are successfully registered!"



