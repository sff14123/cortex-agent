name: Cortex Agents CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: scripts
    
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Sync Dependencies
        run: uv sync

      - name: Verify Environment Setup
        run: |
          # 기본 의존성 충돌 여부 및 환경 생성 성공 여부 검증
          uv run python -c "import mcp; import tree_sitter; print('Environment is strictly valid!')"

      - name: Run Syntax and Import Check
        run: |
          # 파이썬 파일들에 문법적 오류나 Import 에러가 없는지 전체 검증
          uv run python -m py_compile scripts/*.py
          uv run python -m py_compile scripts/cortex/*.py

      - name: Test Core Indexing & Embedding Engine
        run: |
          # 1) 테스트용 다국어 더미 파일(Python, CS, TS) 및 지식 문서(MD) 추가 생성
          echo "def inner_func(): return 1" > dummy.py
          echo "def outer_func(): return inner_func()" >> dummy.py
          echo "namespace Test { public class Sample { void Work() {} } }" > dummy.cs
          echo "export function sampleTs() { return 0; }" > dummy.ts
          echo "---" > dummy.md
          echo "name: test-knowledge" >> dummy.md
          echo "description: A dummy knowledge file" >> dummy.md
          echo "---" >> dummy.md
          echo "# Testing Cortex Extraction" >> dummy.md
          echo "This file proves that markdown and frontmatter parsing works." >> dummy.md
          
          # 2) 파서별 문법 엔진 검증 (knowledge 폴더 3,800+ 파일 타임아웃 방지, 코어 스크립트 스캔)
          # knowledge_backup은 같은 디렉터리 내 rename이므로 인덱서가 그대로 탐지함.
          # workspace 완전 외부(/tmp)로 이동해야 스캔 범위에서 제외됨.
          mv knowledge /tmp/knowledge_ci_backup
          uv run python scripts/cortex/indexer.py . --force
          uv run python scripts/cortex/indexer.py . --file dummy.py --force
          mv /tmp/knowledge_ci_backup knowledge
          
          # 3) 생성된 SQLite DB 파일 및 AST 파서 엣지 무결성(알맹이) 검증
          echo "Verifying generated artifacts and logic..."
          if [ ! -f ./.agents/data/memories.db ]; then
            echo "❌ memories.db missing!"
            exit 1
          fi
          
          # sqlite3로 직접 DB를 까서 Tree-sitter 파서가 CALL 관계를 1개 이상 뽑아냈는지 검사 (dummy.py 기반)
          EDGE_COUNT=$(sqlite3 ./.agents/data/memories.db "SELECT count(*) FROM edges WHERE type='CALLS';")
          if [ "$EDGE_COUNT" -eq 0 ]; then
            echo "❌ AST Parser failed! No CALL edges extracted. The parser might be degraded (Silent Failure)."
            exit 1
          fi
          echo "✅ AST Parser successfully extracted $EDGE_COUNT CALL edges! (Data Integrity Verified)"

      - name: Test MCP Server Protocol (JSON-RPC)
        run: |
          # 1) tools/list API 호출 (껍데기 명세 검증)
          echo '{"jsonrpc": "2.0", "method": "tools/list", "id": 1}' > mcp_list.json
          RESPONSE_LIST=$(uv run python scripts/cortex_mcp.py < mcp_list.json)
          
          CRITICAL_TOOLS=("pc_reindex" "pc_index_status" "pc_capsule" "pc_skeleton" "pc_auto_explore" "pc_impact_graph" "pc_logic_flow" "pc_git_log" "pc_run_pipeline" "pc_auto_context" "pc_read_with_hash" "pc_strict_replace" "pc_create_contract" "pc_todo_manager" "pc_session_sync" "pc_memory_write" "pc_memory_consolidate" "pc_memory_read" "pc_save_observation" "pc_memory_search_knowledge" "pc_run_background_task")
          for tool in "${CRITICAL_TOOLS[@]}"; do
            if [[ "$RESPONSE_LIST" != *"$tool"* ]]; then
              echo "❌ MCP Tool missing from registry: $tool"
              echo "List Response: $RESPONSE_LIST"
              exit 1
            fi
          done
          echo "✅ All critical MCP tools are successfully registered!"

          # 2) tools/call API (pc_index_status) 호출 -> 실제 DB 연동 작동 여부 검증
          echo '{"jsonrpc": "2.0", "method": "tools/call", "id": 2, "params": {"name": "pc_index_status", "arguments": {}}}' > mcp_call.json
          RESPONSE_CALL=$(uv run python scripts/cortex_mcp.py < mcp_call.json)
          
          if [[ "$RESPONSE_CALL" == *"total_nodes"* ]] && [[ "$RESPONSE_CALL" == *"total_memories"* ]]; then
            echo "✅ MCP Server successfully executed tools/call and read the live database!"
          else
            echo "❌ MCP Server failed to execute tools/call or could not read the database!"
            echo "Call Response was: $RESPONSE_CALL"
            exit 1
          fi
          
          # 3) tools/call API (pc_run_pipeline) 호출 -> 실제 반환 구조 및 퀄리티 정밀 검증
          echo '{"jsonrpc": "2.0", "method": "tools/call", "id": 3, "params": {"name": "pc_run_pipeline", "arguments": {"query": "Cortex Extraction"}}}' > mcp_pipeline.json
          RESPONSE_PIPELINE=$(uv run python scripts/cortex_mcp.py < mcp_pipeline.json)
          
          # jq를 사용하여 JSON 파싱 및 구조 검증 (단순 문자열 매치가 아닌 실제 RRF 통합 결과 확인)
          # 1. 에러가 없는지 확인
          ERROR_MSG=$(echo "$RESPONSE_PIPELINE" | jq -r '.error // empty')
          if [ -n "$ERROR_MSG" ]; then
            echo "❌ Pipeline failed with error: $ERROR_MSG"
            exit 1
          fi
          
          # 2. unified_context 배열에 결과가 잘 담겼는지 확인
          # MCP 응답 구조: result.content[0].text (JSON 문자열로 직렬화됨) → 2단계 파싱 필요
          MATCH_COUNT=$(echo "$RESPONSE_PIPELINE" \
            | jq -r '.result.content[0].text' \
            | jq '[.unified_context[]? | select(.key | contains("test-knowledge"))] | length')
          
          if [ "$MATCH_COUNT" -gt 0 ]; then
            echo "🎉 MCP Vector Search successfully retrieved the dummy knowledge via Cross-RRF!"
          else
            echo "❌ MCP Vector Search failed to retrieve the dummy knowledge! Semantic extraction or RRF merging is broken."
            echo "Response: $RESPONSE_PIPELINE"
            exit 1
          fi



