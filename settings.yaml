# ==============================================================================
# 에이전트 동작 및 환경 설정 (Agent Settings)
# ==============================================================================
#
# [사용법] 이 파일(settings.yaml)은 팀 공통 기본값을 정의합니다.
#          사용자 개인 설정(경로, 프레임워크 등)은 settings.local.yaml에 작성하세요.
#          settings.local.yaml은 .gitignore에 의해 공유되지 않습니다.
#
# [우선순위] settings.local.yaml > settings.yaml
#
# [예시] settings.local.yaml 생성:
#   cp .agents/templates/settings.local.yaml.example .agents/settings.local.yaml
#
# [SCHEMA GUIDE]
#   - language: "ko"
#   - tone: "professional" | "casual" | "concise"
#   - modules: "auto" | { backend: [...], frontend: [...] }
#   - preferred_frameworks: "auto" | ["React", "Spring Boot"]
# ==============================================================================

agent_behavior:
  language: "ko"
  language_rule: "Strictly enforce Korean for all outputs."
  tone: "professional"
  silent_shortcuts: [ "@백업", "@로드" ]
  auto_planning: false

project_preferences:
  # "auto": package.json, pom.xml, build.gradle, requirements.txt 등에서 자동 감지
  # 직접 지정: [ "React", "Spring Boot", "Unity", "Docker" ]
  preferred_frameworks: auto
  protocols_path: ".agents/rules/core/protocols/"

# ==============================================================================
# 인덱싱 및 하이브리드 검색 설정 (Indexing Rules)
# ==============================================================================
indexing_rules:
  # 멀티레포 대응: 지식을 공유할 다른 저장소 경로
  linked_workspaces: [] # 예: ["../another-project"]

  # 인덱싱 범위: 기본적으로 프로젝트 전체를 포함 (블랙리스트 방식)
  # 참고: .gitignore에 등록된 항목은 자동으로 제외됩니다.
  include_paths:
    - "**"

  # 인덱싱에서 명시적으로 제외할 범주
  # 개인적인 메모나 캐시, 로그 폴더 등을 이곳에 작성하세요.
  exclude_paths:
    - "tmp/**"
    - "logs/**"
    - "personal_notes/**"

  # 설정 파일 화이트리스트: src 외부에 있어도 맥락 파악을 위해 항상 읽음
  config_whitelist:
    - "*.xml" # pom.xml 등
    - "*.yml" # application.yml 등
    - "*.json" # package.json 등
    - "Dockerfile"
    - "README.md"
    - ".env.example"

  # 모노레포 모듈 정의
  # "auto": 프로젝트 루트를 스캔하여 폴더 구조 자동 감지 (src/, main/, app/ 패턴)
  # 직접 지정: settings.local.yaml에서 오버라이드하세요 (팀원별 경로가 다를 경우)
  #   예:
  #     modules:
  #       backend: ["BE/src/main/java"]
  #       frontend: ["FE/src", "FE/public"]
  #       ai: ["AI"]
  #       unity: ["Assets/Scripts"]
  modules: auto

# ==============================================================================
# 성능 튜닝 설정 (Performance Tuning)
# ==============================================================================
# [설정 가이드] 하드웨어는 자동 감지되지만, 여기서 '사용 의도'를 선택할 수 있습니다.
# 하드웨어 성능보다 높은 모드를 선택해도, 시스템이 자동으로 '안전 수치'로 낮춰줍니다.
tuning:
  # ---------------------------------------------------------------------------
  # [mode] 설정: 시스템의 속도와 자원 사용량을 결정합니다.
  # ---------------------------------------------------------------------------
  #  - auto (기본값) : 현재 PC 사양에 딱 맞는 최적의 값을 자동으로 사용합니다.
  #  - conservative  : 자원을 아껴서 사용합니다. (노트북에서 웹 서핑과 병행할 때)
  #  - balanced      : 일반적인 상황에서 가장 추천하는 설정입니다.
  #  - turbo         : 모든 자원을 끌어다 씁니다. (인덱싱 속도를 극대화할 때)
  #  - custom        : 아래 개별 수치를 직접 고치고 싶을 때 선택하세요.
  mode: auto
  # ---------------------------------------------------------------------------
  # [custom 오버라이드] mode가 'custom'일 때만 아래 값이 적용됩니다.
  # ---------------------------------------------------------------------------
  # batch_size: 40           # 한 번에 처리할 조각 개수 (클수록 빠르나 VRAM 소모)
  # max_chars: 2000          # 한 조각에 담을 글자 수 (클수록 검색이 정확해짐)
  # cache_clear_freq: 5      # GPU 메모리 청소 주기 (숫자가 작을수록 자주 청소)
